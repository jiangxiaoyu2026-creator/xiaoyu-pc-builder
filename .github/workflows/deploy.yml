name: Deploy to Aliyun Server

on:
  push:
    branches: [ "main", "master" ]

concurrency:
  group: deploy-to-aliyun
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies and build frontend
        run: |
          npm install
          npm run build

      # 只上传运行所需文件，避免把 node_modules 等构建缓存传到服务器
      - name: Copy files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "dist,server_py,Dockerfile,docker-compose.yml"
          target: "/root/pcbuilder_release"
          overwrite: true
          strip_components: 0
          tar_tmp_path: "/tmp"
          rm: true

      # 远程登录服务器并重启 Docker
      - name: Execute Docker Compose Restart
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          command_timeout: 60m
          script: |
            set -e
            RELEASE_DIR=/root/pcbuilder_release
            APP_DIR=/root/pcbuilder

            mkdir -p "$APP_DIR"
            rm -rf "$APP_DIR/dist" "$APP_DIR/server_py"
            cp -a "$RELEASE_DIR/dist" "$APP_DIR/dist"
            cp -a "$RELEASE_DIR/server_py" "$APP_DIR/server_py"
            cp -a "$RELEASE_DIR/Dockerfile" "$APP_DIR/Dockerfile"
            cp -a "$RELEASE_DIR/docker-compose.yml" "$APP_DIR/docker-compose.yml"
            cd "$APP_DIR"

            # 添加 Swap 空间防止构建时 OOM (内存溢出)
            if [ ! -f /swapfile ]; then
              echo "Creating 2GB swap space..."
              dd if=/dev/zero of=/swapfile bs=1M count=2048 || true
              chmod 600 /swapfile || true
              mkswap /swapfile || true
            fi
            swapon --show | grep -q '/swapfile' || swapon /swapfile || true

            # 基础信息打印
            df -h && free -m

            # 检测 Docker Compose 命令
            if docker compose version >/dev/null 2>&1; then
              DC="docker compose"
            elif docker-compose version >/dev/null 2>&1; then
              DC="docker-compose"
            else
              echo "Error: Docker Compose not found"
              exit 1
            fi

            echo "Using command: $DC"

            # 清理空间
            docker system prune -f || true

            # 先构建新镜像，成功后再切换容器，避免失败时线上继续使用旧版本
            $DC build
            $DC up -d --remove-orphans

            echo "--- Ready ---"
            docker ps
