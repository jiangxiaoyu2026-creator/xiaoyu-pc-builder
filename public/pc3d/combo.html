        box.getSize(size);
        const maxDim = Math.max(size.x, size.y, size.z) || 1;
        const layout = getLayout(asset, options);
        const scale = layout.realScale ? layout.scale : layout.scale / maxDim;
        root.scale.setScalar(scale);
        root.rotation.set(layout.rx || 0, layout.ry || 0, layout.rz || 0);
        const scaledBox = new THREE.Box3().setFromObject(root);
        const center = new THREE.Vector3();
        scaledBox.getCenter(center);
        root.position.sub(center);
        const finalBox = new THREE.Box3().setFromObject(root);
        root.position.y += -finalBox.min.y;
        root.position.x += layout.x || 0;
        root.position.y += layout.y || 0;
        root.position.z += layout.z || 0;
        if (layout.shell && layoutMode === 'assembled' && asset.category === 'case') {
          const shell = createCaseShell(root);
          scene.add(shell);
          loadedObjects.set(options.temporary ? `tmp:${asset.asset_id}` : asset.category, shell);
          if (options.trackLoading) markLoadingProgress(options.token, asset);
          return;
        }
        scene.add(root);
        loadedObjects.set(options.temporary ? `tmp:${asset.asset_id}` : asset.category, root);
        if (options.trackLoading) markLoadingProgress(options.token, asset);
      }, undefined, (err) => {
        showToast(`加载失败：${asset.model_name || asset.buildcores_name}`);
        console.error(err);
        if (options.trackLoading) markLoadingProgress(options.token, asset);
      });
    }

    function getLayout(asset, options) {
      if (options.preview) return PREVIEW_LAYOUT;
      if (layoutMode === 'assembled') return assembledLayout(asset.category);
      const layout = DISPLAY_LAYOUT[asset.category] || PREVIEW_LAYOUT;
      const spread = exploded ? 1 : 0.38;
      return { ...layout, x: layout.x * spread, z: layout.z * spread };
    }

    function createCaseShell(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = new THREE.Vector3();
      const center = new THREE.Vector3();
      box.getSize(size);
      box.getCenter(center);
      const group = new THREE.Group();
      const shell = new THREE.Mesh(
        new THREE.BoxGeometry(size.x, size.y, size.z),
        new THREE.MeshBasicMaterial({
          color: 0xdfe6e0,
          transparent: true,
          opacity: 0.12,
          depthWrite: false
        })
      );
      shell.position.copy(center);
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(new THREE.BoxGeometry(size.x, size.y, size.z)),
        new THREE.LineBasicMaterial({ color: 0x7e887f, transparent: true, opacity: 0.72 })
      );
      edges.position.copy(center);
      group.add(shell, edges);
      return group;
    }

    function resetCamera() {
      if (layoutMode === 'assembled') {
        const caseRoot = loadedObjects.get('case');
        if (caseRoot) return frameCase(caseRoot);
        camera.position.set(4.1, 2.8, 4.2);
        controls.target.set(0, 1.1, 0.05);
      } else {
        camera.position.set(5.4, 4.2, 6.4);
        controls.target.set(0, 0.55, 0);
      }
      controls.minPolarAngle = 0;
      controls.maxPolarAngle = Math.PI;
      controls.minAzimuthAngle = -Infinity;
      controls.maxAzimuthAngle = Infinity;
      controls.minDistance = 0;
      controls.maxDistance = Infinity;
      controls.update();
    }

    async function saveBuild() {
      const selected = Object.values(build);
      const payload = {
        name: el('buildName').value.trim() || `方案 ${new Date().toLocaleString()}`,
        notes: el('buildNotes').value.trim(),
        parts: selected.map((asset) => ({
          category: asset.category,
          asset_id: asset.asset_id,
          brand: asset.brand_label,
          model_name: asset.model_name,
          buildcores_name: asset.buildcores_name,
          glb_path: asset.glb_path,
          best_confidence: asset.best_confidence,
          color_hint: asset.color_hint
        })),
        layout_mode: layoutMode,
        layout_overrides: layoutOverrides,
        risks: collectRisks().map((risk) => risk.text)
      };
      const saved = JSON.parse(localStorage.getItem('diyxx_combo_site_builds') || '[]');
      saved.unshift({ ...payload, id: Date.now(), created_at: new Date().toISOString() });
      localStorage.setItem('diyxx_combo_site_builds', JSON.stringify(saved.slice(0, 20)));
      showToast('方案已保存到当前浏览器');
    }

    async function saveCalibration() {
      const metrics = window.__diyxxComboDebug?.metrics?.() || {};
      const selected = Object.values(build);
      const payload = {
        name: el('buildName').value.trim() || `校准 ${new Date().toLocaleString()}`,
        notes: el('buildNotes').value.trim(),
        parts: selected.map((asset) => ({
          category: asset.category,
          asset_id: asset.asset_id,
          brand: asset.brand_label,
          model_name: asset.model_name,
          buildcores_name: asset.buildcores_name,
          glb_path: asset.glb_path
        })),
        layout_mode: layoutMode,
        layout_overrides: layoutOverrides,
        anchor_snapshot: {
          case_anchors: metrics.anchors || {},
          part_anchors: metrics.partAnchors || {},
          board_mounts: metrics.boardMounts || {},
          objects: metrics.objects || {}
        }
      };
      const saved = JSON.parse(localStorage.getItem('diyxx_combo_site_calibrations') || '[]');
      saved.unshift({ ...payload, id: Date.now(), created_at: new Date().toISOString() });
      localStorage.setItem('diyxx_combo_site_calibrations', JSON.stringify(saved.slice(0, 20)));
      showToast('校准已保存到当前浏览器');
    }

    async function copyBuild() {
      const lines = Object.values(build).map((asset) => `${CATEGORY_LABELS[asset.category]}：${asset.brand_label} ${asset.model_name || asset.buildcores_name}`);
      await navigator.clipboard.writeText(lines.join('\n'));
      showToast('清单已复制');
    }

    function resize() {
      const wrap = document.querySelector('.stage-wrap');
      const width = wrap.clientWidth;
      const height = wrap.clientHeight;
      camera.aspect = width / Math.max(height, 1);
      camera.updateProjectionMatrix();
      renderer.setSize(width, height, false);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }

    function pill(text, cls = '') {
      return `<span class="pill ${escapeHtml(cls || '')}">${escapeHtml(text || '')}</span>`;
    }

    function showToast(text) {
      const toast = document.querySelector('.toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(window.__toastTimer);
      window.__toastTimer = setTimeout(() => toast.classList.remove('show'), 1400);
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (ch) => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[ch]));
    }
  </script>
</body>
